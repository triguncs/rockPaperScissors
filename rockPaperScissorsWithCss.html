<!DOCTYPE html>
<html>
  <head>
    <title>Rock Paper Scissors</title>
    <style>
      body {
        background-color: rgb(31, 31, 31);
        font-family: Arial, Helvetica, sans-serif;
        color: white;
        margin: 50px;
      }

      .move-icon {
        height: 50px;
      }

      .move-button {
        background-color: transparent;
        border: 3px solid white;
        width: 100px;
        height: 100px;
        border-radius: 60px;
        margin: 10px;
        margin-top: 30px;
        transition: 0.2s;
      }

      .move-button:hover {
        cursor: pointer;
        background-color: rgb(63, 63, 63);
        transform: scale(1.1);
      }

      .move-button:active {
        opacity: 0.5;
        transition: 0s;
      }

      .result {
        font-size: 25px;
        font-weight: bold;
        margin-top: 50px;
      }

      .score {
        margin-top: 50px;
      }

      .reset-score-button {
        background-color: rgb(255, 255, 255);
        color: rgb(0, 0, 0);
        font-size: 15px;
        padding: 10px;
        border-radius: 10px;
        cursor: pointer;
        transition: 0.2s;
        display: flex;
        justify-self: center;
      } 

      .reset-score-button:hover {
        transform: scale(1.1);
      }

      h1 {
        display: flex;
        justify-content: center;
      }

      .button-div {
        display: flex;
        justify-content: center;
      }

      .stats-div {
        display: flex;
        align-items: center;
        flex-direction: column;
      }

    </style>
  </head>
  <body>
    <h1 class="heading">Rock Paper Scissors</h1>
    <div class="button-div">
      <button onclick="playGame('rock');" class="move-button"><img src="rock-emoji.png" class="move-icon"></button>
      <button onclick="playGame('paper');" class="move-button"><img src="paper-emoji.png" class="move-icon"></button>
      <button onclick="playGame('scissors');" class="move-button"><img src="scissors-emoji.png" class="move-icon"></button>
    </div>

    <div class="stats-div">
      <p class="js-result result"></p>
      <p class="js-moves"></p>
      <p class="js-score score"></p>
    </div>

    <button onclick="
      score.losses = 0;
      score.wins = 0;
      score.ties = 0;
      localStorage.removeItem('score');
      updateScoreElement();
    " class="reset-score-button">Reset score</button>

    <script>
      let score = JSON.parse(localStorage.getItem('score')) || {
          wins: 0,
          losses: 0,
          ties: 0
        };

      

      updateScoreElement();

      function playGame(playerMove) {
        const computerMove = pickComputerMove();

        let result = '';

        if (playerMove === 'scissors') {
          if (computerMove === 'rock') {
            result = 'You lose.';
          } else if (computerMove === 'paper') {
            result = 'You win.';
          } else if (computerMove === 'scissors') {
            result = 'Tie.';
          }

        } else if (playerMove === 'paper') {
          if (computerMove === 'rock') {
            result = 'You win.';
          } else if (computerMove === 'paper') {
            result = 'Tie.';
          } else if (computerMove === 'scissors') {
            result = 'You lose.';
          }
          
        } else if (playerMove === 'rock') {
          if (computerMove === 'rock') {
            result = 'Tie.';
          } else if (computerMove === 'paper') {
            result = 'You lose.';
          } else if (computerMove === 'scissors') {
            result = 'You win.';
          }
        }

        if (result === 'You win.') {
          score.wins += 1;
        } else if (result === 'You lose.') {
          score.losses += 1;
        } else if (result === 'Tie.') {
          score.ties += 1;
        }

       
        localStorage.setItem('score', JSON.stringify(score));

        updateScoreElement();

        document.querySelector('.js-result').innerHTML = `${result}`;

        document.querySelector('.js-moves').innerHTML = `You 
      <img src="${playerMove}-emoji.png" class="move-icon">
      <img src="${computerMove}-emoji.png" class="move-icon">
      Computer`;

      }

      function updateScoreElement() {
        document.querySelector('.js-score').innerHTML = `Wins: ${score.wins} Losses: ${score.losses} Ties: ${score.ties}`;
      }

      function pickComputerMove() {
        const randomNumber = Math.random();

        let computerMove = '';

        if (randomNumber >= 0 && randomNumber < 1 / 3) {
          computerMove = 'rock';
        } else if (randomNumber >= 1 / 3 && randomNumber < 2 / 3) {
          computerMove = 'paper';
        } else if (randomNumber >= 2 / 3 && randomNumber < 1) {
          computerMove = 'scissors';
        }

        return computerMove;
      }
    </script>
  </body>
</html>
