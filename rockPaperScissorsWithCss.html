<!DOCTYPE html>
<html>
  <head>
    <title>Rock Paper Scissors</title>
    <link rel="stylesheet" href="styles/rockPaperScissors.css">
  </head>
  <body>
    <h1 class="heading">Rock Paper Scissors</h1>
    <div class="button-div">
      <button onclick="playGame('rock');" class="move-button"><img src="assets/rock-emoji.png" class="move-icon"></button>
      <button onclick="playGame('paper');" class="move-button"><img src="assets/paper-emoji.png" class="move-icon"></button>
      <button onclick="playGame('scissors');" class="move-button"><img src="assets/scissors-emoji.png" class="move-icon"></button>
    </div>

    <div class="stats-div">
      <p class="js-result result"></p>
      <p class="js-moves"></p>
      <p class="js-score score"></p>
    </div>

    <div class="button-container">
      <button onclick="
        score.losses = 0;
        score.wins = 0;
        score.ties = 0;
        localStorage.removeItem('score');
        updateScoreElement(); 
      " class="reset-score-button">Reset score</button>

      <button onclick="
        autoplay();
      " class="autoplay-button">AutoPlay</button>
    </div>

    <script src="scripts/rockPaperScissors.js"></script>
  </body>
</html>
